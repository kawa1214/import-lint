name: import_lint
description: The Import Lint package defines import lint rules and report on
  lints found in Dart code.
version: 2.0.0
homepage: https://kawa.dev
repository: https://github.com/kawa1214/import-lint

environment:
  sdk: ">=3.10.0 <4.0.0"

plugin:
  platforms:
    dart:
      pluginClass: ImportLintPlugin
      fileName: main.dart

dependencies:
  analysis_server_plugin: ^0.3.14
  analyzer: ^12.1.0
  args: ^2.5.0
  cli_util: ^0.4.2
  collection: ^1.19.0
  glob: ^2.1.3
  path: ^1.9.0
  yaml: ^3.1.2

dev_dependencies:
  coverage: ^1.9.0
  lints: ^5.1.0
  test: ^1.25.8
  test_reflective_loader: ^0.2.3
